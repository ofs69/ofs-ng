name: Docs

# Build the plugin-author API reference (docs/apidocs/, DocFX) from the Ofs.Api assembly's XML doc
# comments and publish it to GitHub Pages. Source-of-truth is managed/Ofs.Api — the private,
# gitignored docs/*.wiki mirrors are never part of this. Runs on pushes to main that touch the API or the
# docfx config; the manual trigger lets you re-publish without a code change.
#
# One-time setup outside this file: repo Settings -> Pages -> Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - 'managed/Ofs.Api/**'
      - 'docs/apidocs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Pages needs these; id-token is required by the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight one finish (don't cancel a publish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    name: Build + deploy API docs
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Ofs.Api targets net10.0; DocFX compiles it to extract the XML docs.

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Sync generated pages
        # Keep the generated pages in step with their sources, so the published site is always current
        # (the committed copies are only fallbacks for a local `docfx` build):
        #   * the landing-page version callout, from <Version> in Ofs.Api.csproj, and
        #   * the Getting Started guide, copied verbatim from the StarterPlugin README.
        # Backticks are backslash-escaped so the double-quoted string doesn't trigger command substitution.
        run: |
          version=$(sed -n 's/.*<Version>\([^<]*\)<\/Version>.*/\1/p' managed/Ofs.Api/Ofs.Api.csproj | head -1)
          echo "Stamping Ofs.Api v$version"
          {
            printf '%s\n' '<!-- GENERATED — do not edit. The Docs workflow regenerates this from <Version> in'
            printf '%s\n' '     managed/Ofs.Api/Ofs.Api.csproj before every publish, so the published site always'
            printf '%s\n' '     matches the assembly. This committed copy is the fallback for local `docfx` builds. -->'
            printf '%s\n' "> 📦 This reference documents **\`Ofs.Api\` v$version** — the assembly version your plugin builds against."
          } > docs/apidocs/includes/_apiversion.md
          {
            printf '%s\n' '<!-- GENERATED from managed/plugins/StarterPlugin/README.md — do not edit. The Docs workflow'
            printf '%s\n' '     regenerates this before every publish; this committed copy is the local-build fallback. -->'
            cat managed/plugins/StarterPlugin/README.md
          } > docs/apidocs/articles/getting-started.md

      - name: Build site
        # docfx runs the metadata step (compile Ofs.Api -> api/*.yml) then the build step (render _site).
        run: docfx docs/apidocs/docfx.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/apidocs/_site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
