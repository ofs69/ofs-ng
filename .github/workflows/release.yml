name: Release

# Tag-driven release. Builds Release × {Windows, Linux} × {AVX, compat} = 4 artifacts, runs the CMake
# `dist` target on each, and attaches every zip (Windows …-pdb.zip included) to a GitHub Release.
#
# Three ways it runs:
#  - Automatic on tag push: push a semver tag (`git tag v1.2.0 && git push origin v1.2.0`) and this
#    builds that tag and publishes a GitHub Release for it. A pre-release tag (one with a hyphen, e.g.
#    v1.2.0-rc1) is marked as a pre-release automatically.
#  - Manual full release: dispatch with `publish` ticked AND an existing `tag`. Attaches every zip to
#    the Release for that tag (creating it if absent).
#  - Manual artifacts only (no Release): dispatch with `publish` unchecked. Builds the 4 variants and
#    uploads each as a downloadable run artifact (run page -> Artifacts -> dist-*). `tag` may be left
#    blank — it then builds the branch/ref you dispatch from, and the archive is named off `git
#    describe` (commit hash when there is no tag). Nothing is pushed and no Release is created.
on:
  push:
    tags:
      - 'v[0-9]*' # semver release tags: v0.1.1, v1.2.0-rc1, … (build + publish automatically)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build (required only when publishing; blank = build the dispatched ref)'
        required: false
        type: string
      publish:
        description: 'Attach the artifacts to a GitHub Release for the tag (off = artifacts only)'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark the GitHub release as a pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write # create the release and upload assets

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Explicit ubuntu-24.04 (not floating ubuntu-latest) for reproducible release builds. 22.04
          # would lower the AppImage's glibc floor (2.35, reaching Debian 12 / RHEL 9 / Fedora 36+), but
          # its clang + libstdc++-12 can't compile the codebase's C++20 ranges usage — so the floor is
          # 24.04's GLIBC_2.38 and those older distros lose support. The bundled .NET runtime's own floor
          # is 2.27, never the binding constraint.
          - { os: windows-latest, avx: 'ON',  label: 'avx' }
          - { os: windows-latest, avx: 'OFF', label: 'compat' }
          - { os: ubuntu-24.04,   avx: 'ON',  label: 'avx' }
          - { os: ubuntu-24.04,   avx: 'OFF', label: 'compat' }
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }} # blank tag -> build the dispatched branch/ref
          fetch-depth: 0
          fetch-tags: true # MakeDist runs `git describe --tags` to name the archive
          submodules: recursive # lib/* (SDL3, imgui, json, …) are submodules the build needs

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # --- Linux: SDL3 build deps (no libmpv at build time; runtime-loaded) ---
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build clang python3 \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libwayland-dev wayland-protocols \
            libdecor-0-dev libgl1-mesa-dev libegl1-mesa-dev libudev-dev libdbus-1-dev
          # AppImage packaging only. libmpv is never linked (MpvLoader dlopen's it), but the runtime
          # library has to exist on the build host for make-appimage.sh to copy it and walk its
          # dependencies. 22.04 ships soname .so.1, 24.04 ships .so.2 — MpvLoader tries both.
          # desktop-file-utils gives appimagetool its desktop-file validator.
          sudo apt-get install -y desktop-file-utils
          sudo apt-get install -y libmpv2 || sudo apt-get install -y libmpv1

      # --- Windows: MSVC + Ninja. Release single-config makes the project static-link
      #     SDL3 and nethost (/MT), so the zip ships no SDL3.dll/nethost.dll; libmpv-2.dll
      #     is auto-downloaded by the build and bundled. ---
      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Set up Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5

      # OFS_CLANG_TIDY=OFF: linting is the nightly job's (and PR CI's) responsibility, never the
      # artifact build's — running it here only adds (uncached, slow) wall time. It also keeps the
      # precompiled header active: tidy parses with clang and rejects a PCH built by another compiler,
      # so the build skips the PCH whenever tidy is on (see ofs_target_pch in the root CMakeLists).
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl
          -DOFS_AVX=${{ matrix.avx }}
          -DOFS_BUILD_TESTS=OFF
          -DOFS_CLANG_TIDY=OFF

      # Build with clang, not the runner's default GCC: GCC 13/14 ICEs compiling our co::Fire
      # coroutine flows (build_special_member_call, cp/call.cc) under -O3. CI already builds the
      # whole tree on Linux with clang, so this just matches it for the shipping artifact.
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          -DOFS_AVX=${{ matrix.avx }}
          -DOFS_BUILD_TESTS=OFF
          -DOFS_CLANG_TIDY=OFF

      - name: Build
        run: cmake --build build -j

      - name: Package (dist)
        # Emits bin/dist/<plat>-<app>-<tag>+<hash>[-compat].zip and, where the toolchain produces
        # separate symbols, a sibling zzz-ignore-<plat>[-compat]-<hash>-pdb.zip (Windows native + managed .pdb).
        run: cmake --build build --target dist

      - name: Package (AppImage)
        # Ships alongside the loose .zip, not instead of it: the zip suits a user who unpacks into their
        # own tree, the AppImage is the single-file, no-install form. Both are cut from the same bin/release
        # staging, so they carry identical app bits — the AppImage just adds the .NET runtime, libmpv and
        # the ffmpeg CLIs, which the zip leaves to the system. Naming matches MakeDist.cmake.
        if: runner.os == 'Linux'
        run: tools/appimage/make-appimage.sh --bin-dir bin/release

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.label }}
          # if-no-files-found is evaluated over the whole path set, not per pattern, so the Windows legs
          # (zip only, no AppImage) still satisfy it while a leg that produces nothing at all still fails.
          path: |
            bin/dist/*.zip
            bin/dist/*.AppImage
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    # Runs automatically for a tag push, and on a manual dispatch only when `publish` is ticked. A
    # dispatch with publish off stops after the build job and you just download the dist-* artifacts —
    # no Release, nothing pushed.
    if: ${{ github.event_name == 'push' || inputs.publish }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist # each build job's artifact lands in dist/<artifact-name>/

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Effective tag: the pushed tag on a tag-push, otherwise the dispatch input.
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::publish=true requires a tag (the GitHub Release is created for it). Re-run with an existing tag, or leave publish off to get artifacts only."
            exit 1
          fi
          shopt -s globstar nullglob
          files=(dist/**/*.zip dist/**/*.AppImage)
          if [ ${#files[@]} -eq 0 ]; then echo "No artifacts to publish"; exit 1; fi
          echo "Uploading ${#files[@]} archives:"
          printf '  %s\n' "${files[@]}"
          flags=()
          # Mark a pre-release when explicitly requested, or when the tag is a semver pre-release
          # (carries a hyphen, e.g. v1.2.0-rc1).
          prerelease=false
          if [ "${{ inputs.prerelease }}" = "true" ]; then prerelease=true; fi
          case "$TAG" in *-*) prerelease=true;; esac
          if [ "$prerelease" = "true" ]; then flags+=(--prerelease); fi
          # Create the release for the tag; if it already exists, upload assets into it instead.
          gh release create "$TAG" "${files[@]}" \
            --title "$TAG" \
            --generate-notes \
            "${flags[@]}" \
          || gh release upload "$TAG" "${files[@]}" --clobber
