[AboutChecking]
english     = "Checking for updates…"
description = "About window — status shown while an update check is in progress (trailing ellipsis)."

[AboutUpToDate]
english     = "ofs-ng is up to date."
description = "About window — status shown when no newer release is available."

[AboutUpdateAvailable]
english      = "Version {0} is available."
description  = "About window — status shown when a newer release exists. {0} is the release tag, e.g. v1.2.0."
placeholders = [
    "{0} = latest release version tag",
]

[AboutUpdateFailed]
english     = "Could not check for updates."
description = "About window — status shown when the update check failed (no network, bad response)."

[AboutOpenRelease]
english     = "Open Release Page"
description = "About window — button that opens the newer release's page in the browser."

[AboutCommit]
english     = "Commit"
description = "About window — build info row label: the git commit the build was made from."

[AboutBuilt]
english     = "Built"
description = "About window — build info row label: the build date/time."

[AboutPlatform]
english     = "Platform"
description = "About window — build info row label: OS and compiler the build targets."

[AboutThirdParty]
english     = "Third-Party Software"
description = "About window — section header above the bundled-component attribution list."

[AboutLicenseNote]
english     = "ofs-ng is free software, licensed under the GNU General Public License v3. It includes the third-party software listed below — select an entry to read its full license."
description = "About window — explanatory paragraph above the attribution list."

[AboutColComponent]
english     = "Component"
description = "About window — attribution table column header: the component name."

[AboutColLicense]
english     = "License"
description = "About window — attribution table column header: the component's license identifier."

[AboutSelectPrompt]
english     = "Select a component to view its license."
description = "About window — placeholder shown in the license pane before any component is selected."

[AboutCopyLicense]
english     = "Copy"
description = "About window — button that copies the currently displayed license text to the clipboard."
