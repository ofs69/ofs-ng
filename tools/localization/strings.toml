# strings.toml — English source of truth for ofs-ng localization.
#
# One [Key] table per UI string. The key (table name) is PascalCase and a valid C++
# identifier; it becomes a `Tr` enum member and a `Str::` constant via the build-time
# generator (localization_gen → <build>/generated/Localization/StringsGenerated.{h,cpp}).
#
# Fields:
#   english      — the source string (authoritative here).
#   description  — what the string is / where it appears, written for a translator.
#   placeholders — ordered docs for {0}, {1}, … Omitted entirely for non-formatted strings;
#                  written one entry per line when present.
#
# Translation files (lang/<id>.toml) use the same schema with a `translation` field added.
#
# Extraction is proceeding window by window. Keys are grouped
# by the window they were pulled from. Strings that are user-named data (theme names, file paths)
# or pure identifiers (icon glyphs, format/extension names) are intentionally NOT keyed.

# ─────────────────────────────────────────────────────────────────────────────────────────────
# Preferences window (src/UI/ConfigurationWindow.cpp)
#
# Note: the Theme tab's ~100 data-driven color/variable swatch labels (axis colors, timeline
# colors, geometry vars, node-editor colors, …) are deliberately left in English for a later
# dedicated pass; only the window chrome (titles, headers, buttons, hints, notifications) is keyed.
# ─────────────────────────────────────────────────────────────────────────────────────────────

