# Command group names (CmdGrp*)
#
# Categories every command is filed under; the visible header in the Shortcut Bindings window and
# the prefix in the command palette. The canonical English name remains the grouping/sort key and
# the stable "###grp_<name>" id — only the displayed text is localized. Plugin groups carry no key
# and pass through untranslated.
# ─────────────────────────────────────────────────────────────────────────────────────────────

[CmdGrpCore]
english     = "Core"
translation = "基本"

