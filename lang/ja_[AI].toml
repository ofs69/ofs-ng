# The node-graph "vocabulary" is intentionally NOT keyed: pin labels (in/out/signal/A/B), the math
# node formula labels ("Add  (A + B)", …), the add-node menu's node-type taxonomy (Math/Script and
# the effect/plugin category & display names, which come from registry data), and unit symbols
# ("Hz", "ms") stay English. Only the surrounding chrome, dialogs, buttons, tooltips, and status
# prose below are keyed.
# ─────────────────────────────────────────────────────────────────────────────────────────────

