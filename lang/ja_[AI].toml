translation = "8ビット 4:2:0 (yuv420p) を強制する"

[TranscodeForceYuv420pTip]
english     = "Forces 8-bit 4:2:0 output so playback stays on the hardware-decode fast path. Cost: 10-bit and HDR sources lose color accuracy (banding, and HDR is not tone-mapped)."
translation = "出力を 8ビット 4:2:0 に強制し、再生がハードウェアデコードの高速パスを維持するようにします。代償: 10ビットや HDR のソースは色精度が低下します (バンディングが発生し、HDR はトーンマッピングされません)。"

