[TranscodeMjpegNote]
english     = "MJPEG re-encodes every frame as a full JPEG: the fastest possible seeking, but files run several times larger and demand fast local storage (SSD/NVMe). This is an expert option — if you're not sure, use H.264 instead. It's the right choice for almost everyone."
translation = "MJPEG は各フレームを完全な JPEG として再エンコードします。シークは最速ですが、ファイルは数倍の大きさになり、高速なローカルストレージ (SSD/NVMe) が必要です。これは上級者向けの選択肢です — よくわからない場合は H.264 を使用してください。ほとんどの場合はそれが適切な選択です。"

[TranscodeFastDecode]
english     = "Optimize for decode speed"
translation = "デコード速度を優先する"

[TranscodeFastDecodeTip]
english     = "Drops CABAC and the deblocking filter so each frame decodes faster, improving seeking and frame stepping. Cost: a larger file and more visible block artifacts at the same quality."
translation = "CABAC とデブロッキングフィルターを無効にして各フレームのデコードを高速化し、シークとフレーム送りを改善します。代償: 同じ画質でもファイルが大きくなり、ブロックノイズが目立ちやすくなります。"

[TranscodeForceYuv420p]
