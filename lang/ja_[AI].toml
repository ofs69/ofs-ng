# ja_[AI].toml — Japanese (日本語) translation for ofs-ng.
#
# AI-generated translation. The "_[AI]" filename suffix is the language id and is shown verbatim
# in the language picker, so users can tell machine translations from human-reviewed ones.
#
# Same schema as localization/strings.toml, with a `translation` field added per key.
# `english`/`placeholders` are read-only reference for the translator; only `translation` is
# loaded at runtime. A key with an empty/whitespace translation (or one missing entirely) falls
# back to the built-in English default. For formatted strings the set of {N} placeholders in
# `translation` must match the source (they may be reordered).
#
# Covers the full Preferences window chrome (src/UI/ConfigurationWindow.cpp).

# Reserved metadata (not a translatable string). iso639 is this file's ISO 639 language code; ofs-ng
# hands it to plugins so they can localize themselves to match the language picked here.
[_meta]
iso639 = "ja"

