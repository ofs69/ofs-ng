[TranscodeMjpegNote]
english     = "MJPEG re-encodes every frame as a full JPEG: the fastest possible seeking, but files run several times larger, demand fast local storage (SSD/NVMe), and can't be hardware-decoded — playback falls back to the CPU. This is an expert option — if you're not sure, use H.264 instead. It's the right choice for almost everyone."
translation = "MJPEG réencode chaque image en JPEG complet : la navigation la plus rapide possible, mais les fichiers sont plusieurs fois plus volumineux, nécessitent un stockage local rapide (SSD/NVMe) et ne peuvent pas être décodés par le matériel — la lecture repose alors sur le processeur. Il s'agit d'une option avancée — si vous n'êtes pas sûr, utilisez plutôt H.264. C'est le bon choix pour presque tout le monde."

