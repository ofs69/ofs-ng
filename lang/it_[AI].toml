translation = "Rimuove CABAC e il filtro di deblocking in modo che ogni fotogramma si decodifichi più velocemente, migliorando la ricerca e l'avanzamento fotogramma. Costo: un file più grande e artefatti a blocchi più visibili alla stessa qualità."

