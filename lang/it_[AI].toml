translation = "MJPEG ricodifica ogni fotogramma come JPEG completo: la ricerca è la più veloce possibile, ma i file risultano più volte più grandi e richiedono un'archiviazione locale veloce (SSD/NVMe). Questa è un'opzione avanzata — se non sei sicuro, usa H.264. È la scelta giusta per quasi tutti."

[TranscodeFastDecode]
