translation = "MJPEG (eksperymentalny)"

[TranscodeMjpegNote]
english     = "MJPEG re-encodes every frame as a full JPEG: the fastest possible seeking, but files run several times larger, demand fast local storage (SSD/NVMe), and can't be hardware-decoded — playback falls back to the CPU. This is an expert option — if you're not sure, use H.264 instead. It's the right choice for almost everyone."
translation = "MJPEG koduje każdą klatkę jako pełny obraz JPEG: zapewnia najszybsze możliwe przewijanie, ale pliki są kilkakrotnie większe, wymagają szybkiego lokalnego nośnika (SSD/NVMe) i nie mogą być dekodowane sprzętowo — odtwarzanie odbywa się wtedy na procesorze. To opcja dla zaawansowanych — jeśli nie jesteś pewien, użyj H.264. To właściwy wybór dla prawie każdego."

