translation = "MJPEG (experimentell)"

[TranscodeMjpegNote]
english     = "MJPEG re-encodes every frame as a full JPEG: the fastest possible seeking, but files run several times larger, demand fast local storage (SSD/NVMe), and can't be hardware-decoded — playback falls back to the CPU. This is an expert option — if you're not sure, use H.264 instead. It's the right choice for almost everyone."
translation = "MJPEG kodiert jeden Frame als vollständiges JPEG: schnellstmögliche Sprünge, aber Dateien werden um ein Vielfaches größer, erfordern schnellen lokalen Speicher (SSD/NVMe) und können nicht hardwarebeschleunigt dekodiert werden — die Wiedergabe erfolgt dann über die CPU. Dies ist eine Expertenoption — wenn Sie unsicher sind, verwenden Sie stattdessen H.264. Es ist die richtige Wahl für nahezu jeden."

[TranscodeFastDecode]
english     = "Optimize for decode speed"
translation = "Für Dekodiergeschwindigkeit optimieren"

[TranscodeFastDecodeTip]
english     = "Drops CABAC and the deblocking filter so each frame decodes faster, improving seeking and frame stepping. Cost: a larger file and more visible block artifacts at the same quality."
translation = "Deaktiviert CABAC und den Deblocking-Filter, damit jeder Frame schneller dekodiert wird und Sprünge sowie Einzelbildschritte flüssiger laufen. Nachteil: größere Datei und sichtbarere Blockartefakte bei gleicher Qualität."

